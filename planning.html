<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>STOOM Manager — Planning</title>

<style>
:root{
  --bg:#0a1222;
  --panel:#0f1b34;
  --line:rgba(255,255,255,.10);
  --text:#e9efff;
  --muted:#a9b6da;
  --blue:#3ea2ff;
  --green:#38e08f;
  --yellow:#ffd35a;
  --red:#ff5a73;

  --slotW:12px;
  --slotH:22px;
  --colDay:90px;
  --colVend:140px;
  --colSum:60px;

  --printSlotW:9.5mm;
  --printSlotH:5.5mm;
  --printColDay:20mm;
  --printColVend:32mm;
  --printColSum:14mm;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}
.wrap{max-width:1500px;margin:auto;padding:20px}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.tab{
  border:1px solid var(--line);
  padding:8px 12px;
  border-radius:999px;
  text-decoration:none;
  color:var(--text);
  font-weight:700;
}

.btn{
  border:1px solid var(--line);
  padding:8px 12px;
  border-radius:10px;
  background:rgba(255,255,255,.05);
  cursor:pointer;
  font-weight:700;
}

.plWrap{
  background:rgba(255,255,255,.04);
  padding:12px;
  border-radius:14px;
  overflow:auto;
}

table{
  border-collapse:collapse;
  table-layout:fixed;
  width:100%;
  font-size:11px;
}

th,td{
  border:1px solid rgba(255,255,255,.05);
  padding:0;
}

th{
  background:rgba(255,255,255,.05);
  font-weight:800;
}

.thTime{
  width:var(--slotW);
  writing-mode:vertical-rl;
  transform:rotate(180deg);
  font-size:10px;
}

.slot{
  width:var(--slotW);
  height:var(--slotH);
  cursor:pointer;
}

.slot.work{
  background:rgba(62,162,255,.45);
}

.slot.work2{
  background:rgba(56,224,143,.35);
}

.slot.sel{
  outline:2px solid white;
}

.sum{
  text-align:center;
  font-weight:900;
}

@page{size:A4 landscape;margin:5mm}
@media print{
  *{
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  :root{
    --slotW:var(--printSlotW);
    --slotH:var(--printSlotH);
    --colDay:var(--printColDay);
    --colVend:var(--printColVend);
    --colSum:var(--printColSum);
  }
  header{display:none}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div><b>STOOM Manager — Planning</b></div>
  <div>
    <a class="tab" href="index.html">Retour HUB</a>
  </div>
</header>

<div class="plWrap">
  <div style="margin-bottom:10px;display:flex;gap:10px;flex-wrap:wrap;">
    <input type="date" id="weekStart">
    <select id="paintMode">
      <option value="range">Plage (2 clics)</option>
      <option value="dragOn">Drag ON</option>
      <option value="dragOff">Drag OFF</option>
      <option value="toggle">30 min</option>
    </select>
    <button class="btn" onclick="window.print()">Imprimer</button>
  </div>
  <div id="tableHost"></div>
</div>

</div>

<script>
const KEY="stoom_manager_shared_v1";
const $=s=>document.querySelector(s);

function ymd(d){
  const x=new Date(d);
  return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,"0")}-${String(x.getDate()).padStart(2,"0")}`;
}
function parseYMD(s){
  const p=s.split("-");
  return new Date(p[0],p[1]-1,p[2]);
}
function addDays(d,n){
  const x=new Date(d);
  x.setDate(x.getDate()+n);
  return x;
}

let state=JSON.parse(localStorage.getItem(KEY)||"{}");
if(!state.staff) state.staff=["Arnaud","Léa","Evan"];
if(!state.planning) state.planning={weekStart:ymd(new Date()),grid:{}};

let rangeSel=null;

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function buildSlots(){
  const start=8*60+30;
  const end=19*60;
  let arr=[];
  for(let m=start;m<end;m+=30) arr.push(m);
  return arr;
}

function slotKey(s,d,i){return s+"|"+d+"|"+i}

function getCell(s,d,i){
  return state.planning.grid?.[s]?.[d]?.[i];
}

function setCell(s,d,i,val){
  state.planning.grid[s]??={};
  state.planning.grid[s][d]??={};
  if(val) state.planning.grid[s][d][i]=1;
  else delete state.planning.grid[s][d][i];
}

function build(){
  const slots=buildSlots();
  const monday=parseYMD(state.planning.weekStart);
  let html="<table><thead><tr><th>Jour</th><th>Vendeur</th>";
  slots.forEach(m=>{
    const h=Math.floor(m/60);
    const mm=m%60;
    html+=`<th class="thTime">${h}:${mm==0?"00":mm}</th>`;
  });
  html+="<th>Total</th></tr></thead><tbody>";

  ["Lun","Mar","Mer","Jeu","Ven","Sam"].forEach((day,di)=>{
    html+=`<tr><td colspan="${slots.length+3}" style="background:#111;padding:6px;font-weight:900">${day}</td></tr>`;
    state.staff.forEach((staff,si)=>{
      html+="<tr>";
      html+=`<td>${day}</td><td>${staff}</td>`;
      let total=0;
      slots.forEach((m,i)=>{
        const k=slotKey(staff,day,i);
        const active=getCell(staff,day,i);
        const cls=active?(si%2?"slot work2":"slot work"):"slot";
        if(active) total+=30;
        html+=`<td><div class="${cls}" data-k="${k}"></div></td>`;
      });
      html+=`<td class="sum">${(total/60)}</td>`;
      html+="</tr>";
    });
  });
  html+="</tbody></table>";
  $("#tableHost").innerHTML=html;
  bind();
}

function applyRange(s,d,a,b){
  let start=Math.min(a,b);
  let end=Math.max(a,b)+1; // FIN INCLUSIVE
  const val=!getCell(s,d,start);
  for(let i=start;i<end;i++){
    setCell(s,d,i,val);
  }
  save();
  build();
}

function bind(){
  const mode=$("#paintMode").value;
  let dragging=false;
  let dragVal=null;

  document.querySelectorAll(".slot").forEach(el=>{
    const [s,d,i]=el.dataset.k.split("|");

    el.onclick=()=>{
      if(mode==="range"){
        if(!rangeSel){
          rangeSel={s,d,i:Number(i)};
          el.classList.add("sel");
        }else{
          if(rangeSel.s===s && rangeSel.d===d){
            applyRange(s,d,rangeSel.i,Number(i));
          }
          rangeSel=null;
        }
      }else if(mode==="toggle"){
        setCell(s,d,i,!getCell(s,d,i));
        save();
        build();
      }
    };

    el.onmousedown=()=>{
      if(mode==="dragOn"||mode==="dragOff"){
        dragging=true;
        dragVal=(mode==="dragOn");
        setCell(s,d,i,dragVal);
        save();
        build();
      }
    };
  });

  window.onmouseup=()=>dragging=false;

  window.onkeydown=(e)=>{
    if(e.key==="Escape"){
      rangeSel=null;
      build();
    }
  };
}

$("#weekStart").value=state.planning.weekStart;
$("#weekStart").oninput=()=>{
  state.planning.weekStart=$("#weekStart").value;
  save();
};

build();
</script>
</body>
</html>
